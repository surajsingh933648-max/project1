<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter | Real-Time Exchange Rates</title>
    <link rel="stylesheet" href="currency.css">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <div class="header">
                <h1>💱 Currency Converter</h1>
                <p>Real-time exchange rates</p>
            </div>

            <div class="converter-body">
                <!-- Amount Input -->
                <div class="input-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount" value="1">
                </div>

                <!-- From Currency -->
                <div class="input-group">
                    <label for="fromCurrency">From</label>
                    <div class="currency-select">
                        <img id="fromFlag" class="flag-icon" src="https://flagcdn.com/w20/us.png" alt="flag">
                        <select id="fromCurrency">
                            <option value="USD">🇺🇸 USD - US Dollar</option>
                            <option value="EUR">🇪🇺 EUR - Euro</option>
                            <option value="GBP">🇬🇧 GBP - British Pound</option>
                            <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
                            <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
                            <option value="CAD">🇨🇦 CAD - Canadian Dollar</option>
                            <option value="CHF">🇨🇭 CHF - Swiss Franc</option>
                            <option value="CNY">🇨🇳 CNY - Chinese Yuan</option>
                            <option value="INR">🇮🇳 INR - Indian Rupee</option>
                            <option value="AED">🇦🇪 AED - UAE Dirham</option>
                            <option value="SAR">🇸🇦 SAR - Saudi Riyal</option>
                            <option value="TRY">🇹🇷 TRY - Turkish Lira</option>
                            <option value="RUB">🇷🇺 RUB - Russian Ruble</option>
                            <option value="BRL">🇧🇷 BRL - Brazilian Real</option>
                            <option value="ZAR">🇿🇦 ZAR - South African Rand</option>
                            <option value="SGD">🇸🇬 SGD - Singapore Dollar</option>
                            <option value="NZD">🇳🇿 NZD - New Zealand Dollar</option>
                            <option value="HKD">🇭🇰 HKD - Hong Kong Dollar</option>
                            <option value="KRW">🇰🇷 KRW - South Korean Won</option>
                            <option value="MXN">🇲🇽 MXN - Mexican Peso</option>
                        </select>
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="swap-button">
                    <button id="swapBtn">🔄 Swap</button>
                </div>

                <!-- To Currency -->
                <div class="input-group">
                    <label for="toCurrency">To</label>
                    <div class="currency-select">
                        <img id="toFlag" class="flag-icon" src="https://flagcdn.com/w20/eu.png" alt="flag">
                        <select id="toCurrency">
                            <option value="EUR">🇪🇺 EUR - Euro</option>
                            <option value="USD">🇺🇸 USD - US Dollar</option>
                            <option value="GBP">🇬🇧 GBP - British Pound</option>
                            <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
                            <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
                            <option value="CAD">🇨🇦 CAD - Canadian Dollar</option>
                            <option value="CHF">🇨🇭 CHF - Swiss Franc</option>
                            <option value="CNY">🇨🇳 CNY - Chinese Yuan</option>
                            <option value="INR">🇮🇳 INR - Indian Rupee</option>
                            <option value="AED">🇦🇪 AED - UAE Dirham</option>
                            <option value="SAR">🇸🇦 SAR - Saudi Riyal</option>
                            <option value="TRY">🇹🇷 TRY - Turkish Lira</option>
                            <option value="RUB">🇷🇺 RUB - Russian Ruble</option>
                            <option value="BRL">🇧🇷 BRL - Brazilian Real</option>
                            <option value="ZAR">🇿🇦 ZAR - South African Rand</option>
                            <option value="SGD">🇸🇬 SGD - Singapore Dollar</option>
                            <option value="NZD">🇳🇿 NZD - New Zealand Dollar</option>
                            <option value="HKD">🇭🇰 HKD - Hong Kong Dollar</option>
                            <option value="KRW">🇰🇷 KRW - South Korean Won</option>
                            <option value="MXN">🇲🇽 MXN - Mexican Peso</option>
                        </select>
                    </div>
                </div>

                <!-- Convert Button -->
                <button id="convertBtn" class="convert-btn">Convert Now</button>

                <!-- Result Display -->
                <div class="result" id="result">
                    <div class="result-amount" id="resultAmount">--</div>
                    <div class="rate-info" id="rateInfo">Loading exchange rates...</div>
                </div>

                <!-- Last Updated -->
                <div class="last-updated" id="lastUpdated"></div>
            </div>

            <!-- Popular Conversions -->
            <div class="popular-conversions">
                <h3>Popular Conversions</h3>
                <div class="popular-grid" id="popularGrid"></div>
            </div>
        </div>
    </div>

    <script src="currency.js"></script>
</body>
</html>
